name: Build, Test & Package

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
      fail-fast: false 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Setup Linux Virtual Display (for JavaFX)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        
    - name: Build & Test (Linux)
      if: runner.os == 'Linux'
      run: xvfb-run mvn -B clean test package --file pom.xml
      
    - name: Build & Test (Windows / Mac)
      if: runner.os != 'Linux'
      run: mvn -B clean test package --file pom.xml
      
    - name: Publish Test Results
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: test-results-${{ matrix.os }}
        path: target/surefire-reports/
        retention-days: 5
      
    - name: Upload Compiled JAR
      uses: actions/upload-artifact@v4
      with:
        name: App-Executable-${{ matrix.os }}
        path: target/*.jar
        retention-days: 7
